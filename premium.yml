# Premium (Online Mode) auto-login configuration

# Premium detection mode:
# 'proxy' - Automatically detects premium players using BungeeCord or Velocity UUID forwarding.
# 'standalone' - Automatically detects premium players by performing an encryption handshake.
# 'auto' - Attempts to auto-detect if proxy UUID forwarding is active; otherwise falls back to standalone.
mode: auto

# Cache settings for Mojang API UUID lookups
cache:
  # Duration to cache premium/cracked lookups (e.g. 24h, 7d)
  expiration: 24h

# Fallback behavior when Mojang API is offline
mojang-outage:
  # Options:
  # 'crack' - Treat premium players as cracked and force them to register/login with a password. (Safe, default)
  # 'kick' - Kick premium players when Mojang API is down.
  fallback: kick
  kick-message: "<red>Mojang authentication servers are currently down. Please try again later."

# Bedrock/Geyser Floodgate auto-login settings
floodgate-auto-bypass: true

# Settings for cracked/offline players connecting with premium usernames
cracked-players:
  # Allow cracked players to connect using premium usernames.
  # If true, the server detects if the client UUID matches the premium UUID.
  # Real premium players will bypass login automatically, while cracked players will bypass encryption
  # and be prompted to register/login (preventing "Invalid Session" kicks).
  # If false, the server enforces encryption for all premium usernames (cracked connections will fail to join).
  allow-premium-usernames: true

  # Fetch and apply the real premium player's skin textures to the cracked player's profile on join.
  # (Requires 'allow-premium-usernames' to be true).
  # WARNING: Enabling this may cause a temporary connection lag spike when players join because
  # the server has to query Mojang's API to fetch the skin properties.
  # (For better performance, you can set this to false and use an external plugin like SkinsRestorer instead).
  fetch-premium-skins: false
