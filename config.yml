# peyajAuth Configuration File

# Restrict players who are not authenticated yet
freeze-player-before-login: true

# Restrictions during authentication phase
restrictions:
  disable-damage: true
  disable-hunger: true
  allowed-commands:
    - "/help"
    - "/report"
  # Apply blindness potion effect while unauthenticated
  blindness: true
  # If true, hides all inventory items on the player's screen until they are authenticated
  hide-inventory: true

# Visual screen titles displayed during authentication
titles:
  enabled: true
  # Timings in ticks (20 ticks = 1 second)
  fadeIn: 10
  stay: 60
  fadeOut: 10
  register:
    title: "<gradient:gold:yellow>peyajAuth</gradient>"
    subtitle: "<yellow>Please register using <gold>/register <password></gold></yellow>"
  login:
    title: "<gradient:gold:yellow>peyajAuth</gradient>"
    subtitle: "<yellow>Please login using <gold>/login <password></gold></yellow>"

# Authentication spawn lobby teleportation
spawn:
  enabled: false
  # If true, all players (including premium/auto-logged in ones) are forced to spawn on join and stay there (no teleport back to quit location)
  force-spawn: false
  world: "world"
  x: 0.0
  y: 64.0
  z: 0.0
  yaw: 0.0
  pitch: 0.0

# Timeout in seconds to complete authentication before being kicked (set to 0 or -1 to disable)
# Timeout for registered players to log in
login-timeout: 60
# Timeout for new players to register
register-timeout: 120

# Password rules configuration
password:
  minimum-length: 8
  maximum-length: 64
  require-number: true
  require-uppercase: true
  require-lowercase: true
  require-symbol: false

# Brute force protection settings
brute-force:
  enabled: true
  max-attempts: 5
  cooldown-minutes: 10
  ip-lock-enabled: true
  admin-notifications: true

# Session settings
session:
  # If true, players who briefly disconnect (e.g. game crash) can rejoin without re-typing their password
  # as long as they rejoin within the timeout window from the same IP address.
  enabled: true
  # Supported suffixes: m (minutes), h (hours), d (days)
  timeout: 5m

# Remember login settings (IP and token based)
remember-login:
  # If true, keeps players logged in over multiple days so they don't have to authenticate every time.
  # WARNING: Enabling this will OVERRIDE/OVERLAP the shorter session timeout configuration above,
  # extending the token expiration to the duration defined below (default: 7 days).
  enabled: false
  duration: 7d

# Captcha verification
captcha:
  enabled: false
  # Modes: 'chat' or 'gui'
  mode: chat

# Sound effects for authentication events
# Set to 'none' or leave empty to disable a sound.
# Use standard Bukkit Sound names (e.g. ENTITY_EXPERIENCE_ORB_PICKUP, ENTITY_PLAYER_LEVELUP)
sounds:
  enabled: true
  premium-autologin: "ENTITY_PLAYER_LEVELUP"
  session-autologin: "ENTITY_EXPERIENCE_ORB_PICKUP"
  login-success: "ENTITY_EXPERIENCE_ORB_PICKUP"
  register-success: "ENTITY_PLAYER_LEVELUP"
  login-failure: "ENTITY_VILLAGER_NO"
  captcha-prompt: "BLOCK_NOTE_BLOCK_BELL"
  captcha-success: "ENTITY_EXPERIENCE_ORB_PICKUP"
  captcha-failure: "ENTITY_VILLAGER_NO"
  brute-force-lock: "BLOCK_ANVIL_LAND"
  auth-reminder: "BLOCK_NOTE_BLOCK_PLING"

# GUI PIN Pad Login settings
pin-pad:
  enabled: true
  required-length: 4

# Debug and logging level
debug: false
verbose: false

# Hashing security configurations
security:
  # Hashing algorithm: 'sha256' (default, highly recommended for zero-lag logins), 'argon2', or 'bcrypt'
  algorithm: sha256

  # Cooldown in seconds preventing players from executing /logout during PvP combat (set to 0 to disable)
  combat-logout-cooldown: 10

  # Max registration accounts allowed per IP address (set to 0 to disable limit)
  max-accounts-per-ip: 2
  
  # Argon2 specific parameters
  argon2:
    # Options: 'id' (default, recommended), 'i', 'd'
    type: id
    # Memory usage in KiB (default: 16384 = 16MB)
    memory: 16384
    # CPU iterations/passes (default: 2)
    iterations: 2
    # Degree of parallelism/threads (default: 1)
    parallelism: 1

  # BCrypt specific parameters
  bcrypt:
    # Logarithmic cost factor (default: 10)
    rounds: 10

# Automated SQLite database backup settings
# (Backups are compressed in GZIP format to save disk space)
database-backups:
  enabled: true
  # Interval in hours between backups (default: 24 hours)
  interval-hours: 24
  # Maximum number of backup files to keep (oldest are deleted automatically)
  retention-limit: 7

# SMTP configuration for recovery and verification emails
email:
  enabled: false
  host: "smtp.gmail.com"
  port: 587
  username: "your-email@gmail.com"
  password: "your-app-password"
  ssl: false # Set to true if using port 465 (SSL), false for port 587 (STARTTLS)
  from-name: "peyajAuth Verification"
